<!-- COMPOSANT TRACK-CARD
     Clic sur la carte  → /track/:id  (routerLink)
     Clic sur l'image   → joue/pause  (stopPropagation)
-->
<div class="track-card" [routerLink]="['/track', track.id]">

  <!-- Image + overlay play/pause -->
  <div class="image-wrapper"
       [class.is-playing]="isThisTrackPlaying()"
       (click)="onPlay(); $event.stopPropagation()">
    <img
      [src]="getImageUrl()"
      [alt]="track.title"
      class="music-card-img"
      onerror="this.onerror=null; this.src='assets/placeholder-track.png'">
    <div class="play-overlay">
      @if (isThisTrackPlaying()) {
        <!-- Pause icon -->
        <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
          <rect x="6" y="4" width="4" height="16"/>
          <rect x="14" y="4" width="4" height="16"/>
        </svg>
      } @else {
        <!-- Play icon -->
        <svg viewBox="0 0 24 24" fill="currentColor" width="28" height="28">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      }
    </div>
  </div>

  <!-- Infos texte -->
  <div class="track-info">
    <h6>
      <span class="track-title">{{ track.title }}</span>
      <span class="badge-pending" *ngIf="!track.is_approved">En attente</span>
    </h6>

    <small class="track-artist">
      <a [routerLink]="['/profile', track.composer_user.username]"
         (click)="$event.stopPropagation()">
        {{ track.composer_user.username }}
      </a>
    </small>

    <em class="track-meta">
      {{ track.style || 'Inconnu' }} | {{ track.bpm }} BPM | {{ track.key }}
    </em>

    <div class="track-tags">
      <span
        *ngFor="let tag of track.tags"
        class="tag"
        [attr.data-category]="tag.category"
        [style.background-color]="tagBgColor(tag.color)"
        [style.border-color]="tagBorderColor(tag.color)">
        #{{ tag.name }}
      </span>
      <span class="no-tags" *ngIf="track.tags.length === 0">Pas de tags</span>
    </div>

  </div>

  <!-- Bouton favori -->
  <div class="track-actions">
    <app-favorite-button [trackId]="track.id"></app-favorite-button>
  </div>

</div>
