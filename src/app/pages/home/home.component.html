

<!-- PAGE HOME — gère les états (loading/error/empty) et distribue les tracks -->
<div id="tracks-container">

  <div class="state-loading" *ngIf="loading()">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Chargement...</span>
    </div>
    <p>Chargement des morceaux...</p>
  </div>

  <div class="state-error" *ngIf="error() && !loading()">
    <i class="bi bi-exclamation-triangle-fill"></i>
    {{ error() }}. Rechargez la page ou contactez le support.
  </div>

  <div class="state-empty" *ngIf="!loading() && !error() && tracks().length === 0">
    <i class="bi bi-music-note-list"></i>
    <p>Aucun morceau trouvé.</p>
  </div>

  <app-track-card
    *ngFor="let track of tracks()"
    [track]="track">
  </app-track-card>

</div>
