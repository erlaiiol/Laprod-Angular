<div class="admin-page">

  <div class="admin-header">
    <h1><i class="bi bi-shield-lock-fill"></i> Administration</h1>
  </div>

  <div class="tab-bar">
    <button [class.active]="activeTab() === 'dashboard'"    (click)="setTab('dashboard')">
      <i class="bi bi-speedometer2"></i> Dashboard
    </button>
    <button [class.active]="activeTab() === 'tracks'"       (click)="setTab('tracks')">
      <i class="bi bi-music-note-list"></i> Tracks
      @if (pendingTracks() > 0) { <span class="badge">{{ pendingTracks() }}</span> }
    </button>
    <button [class.active]="activeTab() === 'users'"        (click)="setTab('users')">
      <i class="bi bi-people"></i> Utilisateurs
    </button>
    <button [class.active]="activeTab() === 'engineers'"    (click)="setTab('engineers')">
      <i class="bi bi-headphones"></i> Engineers
      @if (pendingEngineers() > 0) { <span class="badge">{{ pendingEngineers() }}</span> }
    </button>
    <button [class.active]="activeTab() === 'categories'"   (click)="setTab('categories')">
      <i class="bi bi-tags"></i> Catégories
    </button>
    <button [class.active]="activeTab() === 'contracts'"    (click)="setTab('contracts')">
      <i class="bi bi-file-earmark-text"></i> Contrats
    </button>
    <button [class.active]="activeTab() === 'transactions'" (click)="setTab('transactions')">
      <i class="bi bi-cash-stack"></i> Transactions
    </button>
  </div>

  <div class="tab-content">
    @if (activeTab() === 'dashboard') {
      <app-admin-dashboard [onStatsLoaded]="onStatsLoaded.bind(this)" />
    }
    @if (activeTab() === 'tracks') {
      <app-admin-tracks (pendingCountChange)="pendingTracks.set($event)" />
    }
    @if (activeTab() === 'users') {
      <app-admin-users />
    }
    @if (activeTab() === 'engineers') {
      <app-admin-engineers (pendingCountChange)="pendingEngineers.set($event)" />
    }
    @if (activeTab() === 'categories') {
      <app-admin-categories />
    }
    @if (activeTab() === 'contracts') {
      <app-admin-contracts />
    }
    @if (activeTab() === 'transactions') {
      <app-admin-transactions />
    }
  </div>

</div>
