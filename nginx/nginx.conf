# =============================================================================
# Nginx — LaProd Production
# Architecture : Angular SPA (statique) + Flask API (proxy)
#
# Routes Flask proxiées : /api/, /auth/, /tracks/, /cud_tracks/, /toplines/,
#   /filters/, /stream/, /wallet/, /cud_wallet/, /audio/, /mixmaster/, /admin/,
#   /dashboard/, /purchases/, /users/, /contact/
# Routes Angular (SPA fallback) : tout le reste
# Fichiers statiques Flask (/static/) : servis directement par nginx
# =============================================================================

# Upstream Flask / Gunicorn
upstream flask {
    server web:5000;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Serveur HTTP → redirection HTTPS (+ challenge Let's Encrypt)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name laprod.net www.laprod.net;

    # Challenge ACME Certbot (HTTP-01)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# Serveur HTTPS principal
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name laprod.net www.laprod.net;

    # ── SSL ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/laprod.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/laprod.net/privkey.pem;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Headers de sécurité ─────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── Limites ─────────────────────────────────────────────────────────────
    client_max_body_size 100M;   # uploads audio / stems

    # ── Fichiers statiques Flask (images, audio non-streamé, etc.) ──────────
    location /static/ {
        alias /usr/src/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── API Flask — routes proxiées ─────────────────────────────────────────
    # Toutes les requêtes dont le premier segment correspond à un blueprint Flask
    # sont renvoyées vers Gunicorn. Le reste va au SPA Angular.
    location ~ ^/(api|auth|tracks|cud_tracks|toplines|filters|stream|wallet|cud_wallet|audio|mixmaster|mixmaster-api|mixmaster-engineer|mixmaster-artist|mixmaster-payment|favorites-api|admin|dashboard|purchases|users|contact)(/|$) {
        proxy_pass         http://flask;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout élevé pour les uploads audio longs
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        # Support streaming audio (Range requests)
        proxy_buffering off;
    }

    # ── Angular SPA ─────────────────────────────────────────────────────────
    # Sert les fichiers buildés depuis /usr/share/nginx/html.
    # Pour toute URL inconnue (routes Angular), retourne index.html.
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache agressif pour les assets hashés Angular (bundle.xxx.js)
        location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Pas de cache pour index.html (doit toujours être à jour)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
