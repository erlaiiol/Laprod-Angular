# =============================================================================
# LaProd - Docker Compose PRODUCTION
# Stack : frontend (Angular + Nginx) + Flask (Gunicorn) + PostgreSQL + Redis + Certbot
#
# Prérequis :
#   - Copier .env.example → .env et remplir les variables
#   - Lancer ng build avant le premier déploiement (ou laisser Dockerfile.frontend le faire)
#
# Premier démarrage :
#   docker compose up -d --build
#
# Mise à jour du code :
#   git pull && docker compose up -d --build
#
# Logs :
#   docker compose logs -f
#   docker compose logs -f web
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    shm_size: 256mb
    env_file: .env
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis — stockage refresh tokens JWT + cache OAuth
  # Pas de port exposé en prod (accès interne uniquement)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Flask / Gunicorn (API uniquement — plus de Jinja en prod)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 1g
    env_file: .env
    environment:
      FLASK_ENV:    production
      FLASK_APP:    app.py
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      REDIS_URL:    redis://redis:6379/0   # pour flask_limiter (module-level)
      REDIS_HOST:   redis                 # pour redis_client (init_extensions)
      REDIS_PORT:   "6379"
      REDIS_DB:     "0"
    volumes:
      - ./static:/usr/src/app/static    # uploads persistants
      - ./logs:/usr/src/app/logs
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "--max-time", "3", "http://localhost:5000/auth/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Frontend : Angular (build) + Nginx (reverse proxy + SPA)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./static:/usr/src/app/static:ro       # fichiers statiques Flask (images, audio)
      - certbot_www:/var/www/certbot:ro        # challenge Let's Encrypt
      - certbot_conf:/etc/letsencrypt:ro       # certificats SSL
    depends_on:
      web:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Certbot — Let's Encrypt (déclenché manuellement)
  #
  # Premier certificat :
  #   docker compose run --rm certbot certonly --webroot \
  #     --webroot-path=/var/www/certbot \
  #     -d laprod.net -d www.laprod.net \
  #     --email contact@laprod.net --agree-tos --no-eff-email
  #
  # Renouvellement (cron Ubuntu) :
  #   0 3 * * 1 docker compose run --rm certbot renew \
  #             && docker compose exec frontend nginx -s reload
  # ---------------------------------------------------------------------------
  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    profiles:
      - certbot

# -----------------------------------------------------------------------------
# Volumes persistants
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:
